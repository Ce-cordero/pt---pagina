  margin-top: 10px;

  outline: none;
  cursor: pointer;

}

/* 🔴 ELIMINA EL RECUADRO AZUL */

<body>

<div class="container" id="app"></div>

<script type="module">


window.cancelarTest = function() {
  const confirmar = confirm("¿Seguro que quieres salir del test?");
  
  if (confirmar) {
    window.location.href = "../simulaciones.html"; // 🔥 cambia por tu ruta real
  }
}


function mezclarArray(array) {
  let copia = [...array];

  for (let i = copia.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }

  return copia;
}

// ================== INTRO ==================
function mostrarIntro() {
preguntas = mezclarArray(preguntas);

  document.getElementById("app").innerHTML = `

    <div class="box intro">
<h2>¿Qué es el Quid Pro Quo?</h2>

<p>
El <b>quid pro quo</b> es un tipo de ataque de ingeniería social en el que un atacante
ofrece algo a cambio de información o acceso.
</p>

<p>
A diferencia de otros ataques, aquí la víctima recibe una supuesta ayuda, beneficio
o recompensa a cambio de realizar una acción o compartir datos sensibles.
</p>

<p>
<b>¿Cuál es la finalidad?</b><br>
El objetivo es convencerte de entregar información o permitir acceso
a cambio de un beneficio aparentemente legítimo.
</p>

<p>
<b>¿Para qué usan tu información?</b><br>
Los atacantes pueden utilizar los datos obtenidos para:
</p>

<ul class="lista">
  <li>Acceder a tus cuentas personales o laborales</li>
  <li>Instalar malware en tu dispositivo</li>
  <li>Robar información confidencial</li>
  <li>Realizar fraudes o suplantación de identidad</li>
  <li>Obtener acceso a sistemas internos</li>
</ul>

<p>
En esta simulación aprenderás a identificar ofertas sospechosas
y a no intercambiar información sensible por beneficios dudosos.
</p>
      <button class="btn" onclick="iniciarSimulacion()">
        Comenzar simulación
      </button>
    </div>
  `;
}

// ================== QUIZ ==================


let preguntas = [

{
contenido: `
<button class="cancel-btn" onclick="cancelarTest()">Volver a simulaciones</button>
<div class="email">
<div class="email-header">
<strong>De:</strong> UAM Unidad Cuajimalpa &lt;UAMActuBien@gmail.com&gt;<br>
<strong>Asunto:</strong> Actualizar cuenta de correoelectronico Biembenidos a la UAM Unidad Cuajimalpa
</div>
<div>
Bienbenido a la Uam Unidad Cuajimalpa<br><br>
Nos guataria informarle de que actualmente estamos llevendo a cabo el mantenimiento programado y actualizacion de nuestra cuenta de servicio y como resultado de esta su cuenta tiene que ser suspendida<br><br>

Pedimos disculpas por cualquier inconveniente causado. Para mantener su cuenta, ustes deve responder a este correo electronico de inmediato  introdusca la informacion siguiente:<br><br>

ID de usuario:<br>
Contraceña:<br><br>

Si no lo hace dentro de las 72 horas imediatamente hara que que su cuenta quede desactivada de nuestra base de datos.<br><br>

Gracias por usar nestros servicios.
<br><br>

<a href="#" class="fake-btn">Restablecer acceso</a>
</div>
</div>
<p><b>¿Este correo es confiable?</b></p>
`,
opciones: [
{ texto: "Sí, es legítimo", correcta: false },
{ texto: "No, es phishing", correcta: true }
],
explicacion: "Usa urgencia y dirección del remitente falso"
},


];


// VARIABLES
let actual = 0;
let puntos = 0;

// INICIAR QUIZ
window.iniciarSimulacion = function () {
  document.getElementById("app").innerHTML = `
    <h2 id="titulo"></h2>
    <div class="progress">
      <div class="progress-bar" id="barra"></div>
    </div>
    <div class="box" id="contenido"></div>
    <div id="opciones"></div>
    <p id="feedback"></p>
  `;
  mostrarPregunta();
};

// MOSTRAR PREGUNTA
function mostrarPregunta() {
  let p = preguntas[actual];

  document.getElementById("titulo").innerText =
    "Simulación (" + (actual + 1) + " de " + preguntas.length + ")";

  document.getElementById("contenido").innerHTML = p.contenido;

  let opcionesDiv = document.getElementById("opciones");
  opcionesDiv.innerHTML = "";

  p.opciones.forEach(op => {
    let btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = op.texto;
    btn.onclick = () => responder(op.correcta, p.explicacion);
    opcionesDiv.appendChild(btn);
  });

  document.getElementById("barra").style.width =
    ((actual) / preguntas.length) * 100 + "%";
}



// RESPONDER
function responder(correcta, explicacion) {
  let feedback = document.getElementById("feedback");

  if (correcta) {
    puntos++;
    feedback.innerHTML = `
      <div class="feedback correcto">
        ✅ Correcto<br>${explicacion}
      </div>`;
  } else {
    feedback.innerHTML = `
      <div class="feedback incorrecto">
        ❌ Incorrecto<br>${explicacion}
      </div>`;
  }

  // 🔒 Desactivar botones
  let botones = document.querySelectorAll("#opciones .btn");
  botones.forEach(b => b.disabled = true);

  // 👉 Botón siguiente
  let siguienteBtn = document.createElement("button");
  siguienteBtn.className = "btn";
  siguienteBtn.innerText = "Siguiente";

  siguienteBtn.onclick = () => {
    actual++;

    if (actual < preguntas.length) {
      mostrarPregunta();
      document.getElementById("feedback").innerHTML = "";
    } else {
      terminar();
    }
  };

  document.getElementById("feedback").appendChild(siguienteBtn);
}

// FINAL
async function terminar() {

  let calificacion = Math.round(
    (puntos / preguntas.length) * 100
  );


  while (!window.authCargada) {
    await new Promise(resolve => setTimeout(resolve,100));
  }


  if (!window.usuarioActual) {
    alert("Debes iniciar sesión");
    return;
  }


  try {

    await window.setDoc(

      window.doc(
        window.db,
        "usuarios",
        window.usuarioActual.uid,
        "resultados",
        "phishing"
      ),

      {

        nombre: window.usuarioActual.displayName ||
                window.usuarioActual.email.split("@")[0],
        email: window.usuarioActual.email,
        tipo: "Phishing",
        estado: "Completada",
        puntos: puntos,
        total: preguntas.length,
        calificacion: calificacion,
        fecha: new Date()
      }
    );


  } catch (e) {
    console.error(
      "Error guardando resultado:",
      e
    );

  }

  document.getElementById("app").innerHTML = `

    <div class="box">
      <h2>Resultado final</h2>

      <p>
        Puntaje:
        ${puntos} / ${preguntas.length}
      </p>

      <p>
        Calificación:
        ${calificacion}%
      </p>

      <p>
        Estado:
        Completado
      </p>

      <button 
      class="btn" 
      onclick="location.reload()">
        Reintentar
      </button>


      <button 
      class="btn" 
      onclick="window.location.href='../dashboard.html'">
        ⌂ Ir al inicio
      </button>


      <button 
      class="btn" 
      onclick="window.location.href='../simulaciones.html'">
        ⎔ Ver simulaciones
      </button>


    </div>

  `;
}

// INICIAR
mostrarIntro();

</script>
