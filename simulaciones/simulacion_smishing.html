<!DOCTYPE html>
<html lang="es">
<head> <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Simulación de Smishing</title>
<style>
  
body {
  background: #0f172a;
  color: #e5e7eb;
  font-family: Arial, Helvetica, sans-serif;
  padding: 20px;
   line-height: 1.5; /* 🔥 nuevo */
}

.container {
  max-width: 65ch; /* 🔥 clave (60–70 caracteres) */
  margin: auto;
}

.lista {
  text-align: left;
  margin: 15px 0;
  padding-left: 20px;
  color: #cbd5f5;
  line-height: 1.7;
}

.box {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  margin: 20px 0;
}

h2, #titulo {
  text-align: center;
}

.btn {
  text-align: center;
}

p {
  margin-bottom: 12px;
}

.cancel-btn {
  position: fixed; /* 🔥 lo deja fijo en pantalla */
  top: 20px;
  right: 20px;
  background: #ef4444;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  z-index: 1000;
}

.cancel-btn:hover {
  background: #dc2626;
}


/* 📘 INTRO */
.intro h2 {
  margin-bottom: 10px;
}

.intro p {
  font-size: 15px;
  line-height: 1.6;
  color: #cbd5f5;
}

/* Botón general */
.btn {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
  font-weight: 600;
  font-size: 16px;
}

.btn:hover {
  background: #2b3bf1;
}

/* Barra progreso */
.progress {
  height: 8px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: #38bdf8;
  width: 0%;
}

/* Gmail estilo */
.email {
  background: #ffffff;
  border: 1px solid #dadce0;
  border-radius: 8px;
  padding: 16px;
  font-size: 14px;
  color: #202124;
  text-align: left;
}

.email-header {
  border-bottom: 1px solid #dadce0;
  padding-bottom: 10px;
  margin-bottom: 10px;
  font-size: 13px;
}

/* 🔴 CORREGIDO: evita estilos de enlace */
.email a {
  text-decoration: none;
  color: inherit;
}

/* 🔥 BOTÓN FALSO (sin borde azul) */
.fake-btn {
  display: inline-block;
  background: #e8431a;
  color: rgb(10, 10, 10);
  padding: 10px 16px;
  border-radius: 6px;
  margin-top: 10px;
  border: none;
  outline: none;
  cursor: pointer;
  font-size: 14px;
}

/* 🔴 ELIMINA EL RECUADRO AZUL */
.fake-btn:focus,
.fake-btn:active {
  outline: none;
  box-shadow: none;
}

/* Opciones */
#opciones .btn {
  margin-top: 10px;
}

.feedback {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  color: white;
  font-weight: 500;
}

.correcto {
  background: #14532d;
}

.incorrecto {
  background: #7f1d1d;
}

.sms {
  background: #ffffff; /* 🔥 fondo blanco */
  color: #000; /* texto negro */
  padding: 12px 16px;
  border-radius: 18px;
  margin: 15px auto;
  max-width: 300px;
  text-align: left;
  font-size: 14px;
  line-height: 1.4;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  position: relative;
}

.pregunta {
  text-align: center;
}

</style>
</head>

<body>

<div class="container" id="app"></div>

<script type="module">


window.cancelarTest = function() {
  const confirmar = confirm("¿Seguro que quieres salir del test?");
  
  if (confirmar) {
    window.location.href = "../simulaciones.html"; // 🔥 cambia por tu ruta real
  }
}


function mezclarArray(array) {
  let copia = [...array];

  for (let i = copia.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }

  return copia;
}

// ================== INTRO ==================
function mostrarIntro() {
preguntas = mezclarArray(preguntas);

  document.getElementById("app").innerHTML = `

    <div class="box intro">
       <h2>¿Qué es el Smishing?</h2>

      <p>
      El <b>smishing</b> es un tipo de ataque de <b>ingeniería social</b> que se realiza
      a través de <b>mensajes SMS</b> o aplicaciones de mensajería.
      </p>

      <p>
      La palabra proviene de la combinación de <b>"SMS"</b> y <b>"phishing"</b>,
      ya que funciona de manera similar: el atacante intenta engañarte
      para que reveles información personal o hagas clic en enlaces maliciosos.
      </p>

      <p>
      Generalmente, estos mensajes parecen provenir de empresas reales como
      bancos, paqueterías (DHL, FedEx), plataformas (Netflix, Amazon) o incluso
      instituciones gubernamentales.
      </p>

      <p>
      <b>¿Cuál es la finalidad?</b><br>
      El objetivo principal es que hagas clic en un enlace falso o proporciones
      información sensible como contraseñas, datos bancarios o códigos de verificación.
      </p>

      <p>
      <b>¿Para qué usan tus datos?</b><br>
      Los atacantes pueden utilizar la información robada para:
      </p>

     <ul class="lista">
      • Vaciar cuentas bancarias<br>
      • Realizar compras sin tu autorización<br>
      • Robar tu identidad (suplantación)<br>
      • Acceder a tus redes sociales o correo<br>
      • Estafar a tus contactos haciéndose pasar por ti<br>
      • Vender tus datos en internet (dark web)<br>
      </ul>

      <p>
      <b>Señales comunes de Smishing:</b>
      </p>

      <ul class="lista">
        • Mensajes con urgencia ("tu cuenta será bloqueada")<br>
        • Enlaces sospechosos o acortados<br>
        • Ofertas demasiado buenas para ser verdad<br>
        • Mensajes de números desconocidos<br>
        • Errores ortográficos o dominios raros (.xyz, .top, etc.)<br>
      </ul>
      </p>

      <p>
      En esta simulación aprenderás a identificar mensajes SMS falsos
      y evitar caer en este tipo de ataques.
      </p>
      <button class="btn" onclick="iniciarSimulacion()">
        Comenzar simulación
      </button>
    </div>
  `;
}

// ================== QUIZ ==================


let preguntas = [

{
contenido: `
<button class="cancel-btn" onclick="cancelarTest()">Volver a simulaciones</button>
<div class="sms">
Juan Lopez envio $3,365MXN a la cuenta 
terminada en 5536272829 via transferencia.
Revisa tu app y retira el saldo disponible:
http://bit.ly/4pGsntf?3745
</div>
<p class="pregunta"><b>¿Este mensaje es confiable?</b></p>
`,
opciones: [
{ texto: "Sí, es legítimo", correcta: false },
{ texto: "No, es smishing", correcta: true }
],
explicacion: "El mensaje intenta generar urgencia y curiosidad al mencionar una transferencia de dinero que el usuario no solicitó. Además, utiliza un enlace acortado (bit.ly), lo cual oculta el destino real y es una técnica común en ataques de smishing para redirigir a sitios fraudulentos que roban información."
},

{
contenido: `
<button class="cancel-btn" onclick="cancelarTest()">Volver a simulaciones</button>
<div class="sms">
Debido a la direccion incorrecta que ingreso, 
el paquete se retrasara y 
no se enviara hasta que se 
corrija: http://dhl-entrega.xyz
</div>
<p class="pregunta"><b>¿Este mensaje es confiable?</b></p>
`,
opciones: [
{ texto: "Sí, es legítimo", correcta: false },
{ texto: "No, es smishing", correcta: true }
],
explicacion: "Genera urgencia con un problema de entrega y usa un enlace con dominio sospechoso (.xyz), típico de fraude."
},

{
contenido: `
<button class="cancel-btn" onclick="cancelarTest()">Volver a simulaciones</button>
<div class="sms">
Netflix: Detectamos un problema con tu cuenta.
Evita la suspensión revisando tu información aquí:
https://www.netflix.com/account
</div>
<p class="pregunta"><b>¿Este mensaje es confiable?</b></p>
`,
opciones: [
{ texto: "Sí, es legítimo", correcta: true },
{ texto: "No, es smishing", correcta: false }
],
explicacion: "Aunque genera urgencia y contiene un enlace, este dirige al dominio oficial de Netflix y no pide datos directamente por el mensaje."
},

{
contenido: `
<button class="cancel-btn" onclick="cancelarTest()">Volver a simulaciones</button>
<div class="sms">
FedEx: Tu paquete está en camino.
Consulta el estado de tu envío aquí:
https://www.fedex.com/apps/fedextrack/?tracknumbers=784512369
</div>
<p class="pregunta"><b>¿Este mensaje es confiable?</b></p>
`,
opciones: [
{ texto: "Sí, es legítimo", correcta: true },
{ texto: "No, es smishing", correcta: false }
],
explicacion: "Aunque incluye un enlace, usa el dominio oficial de la empresa y no solicita datos sensibles."
},

{
contenido: `
<button class="cancel-btn" onclick="cancelarTest()">Volver a simulaciones</button>
<div class="sms">
BBVA: Detectamos actividad inusual en su cuenta.
Por seguridad, verifique su identidad aquí:
https://bbva-seguridad-cliente.com/verificar
</div>
<p class="pregunta"><b>¿Este mensaje es confiable?</b></p>
`,
opciones: [
{ texto: "Sí, es legítimo", correcta: false },
{ texto: "No, es smishing", correcta: true }
],
explicacion: "El mensaje genera urgencia y dirige a un enlace que imita al banco, pero no es oficial."
}

];


// VARIABLES
let actual = 0;
let puntos = 0;

// INICIAR QUIZ
window.iniciarSimulacion = function () {
  document.getElementById("app").innerHTML = `
    <h2 id="titulo"></h2>
    <div class="progress">
      <div class="progress-bar" id="barra"></div>
    </div>
    <div class="box" id="contenido"></div>
    <div id="opciones"></div>
    <p id="feedback"></p>
  `;
  mostrarPregunta();
};

// MOSTRAR PREGUNTA
function mostrarPregunta() {
  let p = preguntas[actual];

  document.getElementById("titulo").innerText =
    "Simulación (" + (actual + 1) + " de " + preguntas.length + ")";

  document.getElementById("contenido").innerHTML = p.contenido;

  let opcionesDiv = document.getElementById("opciones");
  opcionesDiv.innerHTML = "";

  p.opciones.forEach(op => {
    let btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = op.texto;
    btn.onclick = () => responder(op.correcta, p.explicacion);
    opcionesDiv.appendChild(btn);
  });

  document.getElementById("barra").style.width =
    ((actual) / preguntas.length) * 100 + "%";
}



// RESPONDER
function responder(correcta, explicacion) {
  let feedback = document.getElementById("feedback");

  if (correcta) {
    puntos++;
    feedback.innerHTML = `
      <div class="feedback correcto">
        ✅ Correcto<br>${explicacion}
      </div>`;
  } else {
    feedback.innerHTML = `
      <div class="feedback incorrecto">
        ❌ Incorrecto<br>${explicacion}
      </div>`;
  }

  // 🔒 Desactivar botones
  let botones = document.querySelectorAll("#opciones .btn");
  botones.forEach(b => b.disabled = true);

  // 👉 Botón siguiente
  let siguienteBtn = document.createElement("button");
  siguienteBtn.className = "btn";
  siguienteBtn.innerText = "Siguiente";

  siguienteBtn.onclick = () => {
    actual++;

    if (actual < preguntas.length) {
      mostrarPregunta();
      document.getElementById("feedback").innerHTML = "";
    } else {
      terminar();
    }
  };

  document.getElementById("feedback").appendChild(siguienteBtn);
}

// FINAL
async function terminar() {

  let calificacion = Math.round(
    (puntos / preguntas.length) * 100
  );


  while (!window.authCargada) {
    await new Promise(resolve => setTimeout(resolve,100));
  }


  if (!window.usuarioActual) {
    alert("Debes iniciar sesión");
    return;
  }


  try {

    await window.setDoc(

      window.doc(
        window.db,
        "usuarios",
        window.usuarioActual.uid,
        "resultados",
        "smishing"
      ),

      {

        nombre: window.usuarioActual.displayName ||
                window.usuarioActual.email.split("@")[0],
        email: window.usuarioActual.email,
        tipo: "smishing",
        estado: "Completada",
        puntos: puntos,
        total: preguntas.length,
        calificacion: calificacion,
        fecha: new Date()
      }
    );


  } catch (e) {
    console.error(
      "Error guardando resultado:",
      e
    );

  }

  document.getElementById("app").innerHTML = `

    <div class="box">
      <h2>Resultado final</h2>

      <p>
        Puntaje:
        ${puntos} / ${preguntas.length}
      </p>

      <p>
        Calificación:
        ${calificacion}%
      </p>

      <p>
        Estado:
        Completado
      </p>

      <button 
      class="btn" 
      onclick="location.reload()">
        Reintentar
      </button>


      <button 
      class="btn" 
      onclick="window.location.href='../dashboard.html'">
        ⌂ Ir al inicio
      </button>


      <button 
      class="btn" 
      onclick="window.location.href='../simulaciones.html'">
        ⎔ Ver simulaciones
      </button>


    </div>

  `;
}

// INICIAR
mostrarIntro();

</script>


<script type="module">

  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";


  const firebaseConfig = {
    apiKey: "AIzaSyAXPWOlOJcU06IeH1hG87OUbuqljjEewAI",
    authDomain: "cybersecurity-1710f.firebaseapp.com",
    projectId: "cybersecurity-1710f",
    storageBucket: "cybersecurity-1710f.firebasestorage.app",
    messagingSenderId: "179436600475",
    appId: "1:179436600475:web:81c029bac9b3adc2c1da3e"
  };

  const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🌍 HACER GLOBAL
window.db = db;
window.setDoc = setDoc;
window.doc = doc;
window.usuarioActual = null;
window.authCargada = false;

// 👤 DETECTAR USUARIO
onAuthStateChanged(auth, (user) => {

  window.usuarioActual = user;
  window.authCargada = true;

});
</script>

</body>
</html>
